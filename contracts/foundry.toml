[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]
optimizer = true
optimizer_runs = 1
via_ir = true
fs_permissions = [
    { access = "read", path = "../circuits" },
    { access = "write", path = "../addresses.json" }
]
